<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta2 Viewer - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0f;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --primary-accent: #ff4757;
            --secondary-accent: #5352ed;
            --text-color: #f1f2f6;
            --text-muted: #a4b0be;
            --danger-color: #ff6b6b;
            --success-color: #1dd1a1;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ぼかし背景の装飾 */
        .decoration {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
        }
        .dec-1 { top: -100px; left: -100px; background: var(--primary-accent); }
        .dec-2 { bottom: -100px; right: -100px; background: var(--secondary-accent); }

        .admin-box {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden { display: none !important; }

        /* 管理系UI */
        #management-section { margin-top: 32px; }

        .key-list {
            list-style: none;
            padding: 0;
            margin: 24px 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .key-text { font-family: monospace; font-size: 1.1rem; }

        .del-btn {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 6px 12px;
            width: auto;
            font-size: 0.8rem;
            box-shadow: none;
        }
        .del-btn:hover { background: var(--danger-color); color: white; }

        .add-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .add-row input { flex: 1; }
        .add-row button { width: auto; padding: 0 20px; }

        .msg {
            margin-top: 16px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
        }
        .msg.error { background: rgba(255,107,107,0.1); color: var(--danger-color); border: 1px solid var(--danger-color); }
        .msg.success { background: rgba(29,209,161,0.1); color: var(--success-color); border: 1px solid var(--success-color); }
        
        .logout-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
        }
        .logout-link:hover { color: var(--primary-accent); }
    </style>
</head>
<body>
    <div class="decoration dec-1"></div>
    <div class="decoration dec-2"></div>

    <div class="admin-box">
        <h1>Admin Panel</h1>
        <p class="subtitle">合言葉の一覧取得・発行・削除を行います</p>

        <!-- ログインフォーム -->
        <div id="login-section">
            <div class="input-group">
                <label for="admin-password">Administrator Password</label>
                <input type="password" id="admin-password" placeholder="管理者用パスワードを入力">
            </div>
            <button id="login-btn">管理画面へログイン</button>
            <div id="login-msg" class="msg hidden"></div>
        </div>

        <!-- 管理セクション -->
        <div id="management-section" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>有効な合言葉リスト</label>
                <button id="refresh-btn" style="width: auto; padding: 4px 10px; font-size: 0.75rem;">🔄 更新</button>
            </div>
            <ul id="key-list-ul" class="key-list">
                <!-- ここに合言葉が並ぶ -->
            </ul>

            <label>新しく合言葉を発行</label>
            <div class="add-row">
                <input type="text" id="new-key-input" placeholder="例: himitsu123">
                <button id="add-btn">＋ 追加</button>
            </div>
            <div id="manage-msg" class="msg hidden"></div>

            <a href="#" id="logout-btn" class="logout-link">ログアウト</a>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
